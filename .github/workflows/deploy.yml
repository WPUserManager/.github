# Reusable deploy workflow for WPUM plugins
# Lives in: WPUserManager/.github/.github/workflows/deploy.yml
#
# Called by each plugin repo's release.yml via workflow_call.
# Triggered when a tag matching v*.*.* is pushed.
#
# Usage in a plugin repo:
#   jobs:
#     deploy:
#       uses: WPUserManager/.github/.github/workflows/deploy.yml@master
#       with:
#         plugin-slug: wp-user-manager
#       secrets: inherit

name: Deploy Plugin

on:
  workflow_call:
    inputs:
      plugin-slug:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "18"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer:v2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Read release config
        id: config
        run: |
          if [ -f release.json ]; then
            echo "type=$(jq -r '.type' release.json)" >> $GITHUB_OUTPUT
            echo "wordpress_org=$(jq -r '.channels.wordpress_org' release.json)" >> $GITHUB_OUTPUT
            echo "edd=$(jq -r '.channels.edd' release.json)" >> $GITHUB_OUTPUT
            echo "edd_download_id=$(jq -r '.edd_download_id // empty' release.json)" >> $GITHUB_OUTPUT
          else
            echo "type=addon" >> $GITHUB_OUTPUT
            echo "wordpress_org=false" >> $GITHUB_OUTPUT
            echo "edd=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Node dependencies
        run: |
          if [ -f yarn.lock ]; then
            # Use --ignore-scripts to skip native builds (e.g. node-sass on Node 14)
            # then download prebuilt binaries separately
            yarn install --ignore-engines --ignore-scripts
            if [ -d node_modules/node-sass ]; then
              node node_modules/node-sass/scripts/install.js || true
            fi
          elif [ -f package-lock.json ]; then
            npm ci
          fi

      - name: Install Composer dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Generate POT translation file
        run: |
          if npx grunt --version &> /dev/null 2>&1; then
            npx grunt do_pot || echo "::warning::do_pot failed — .pot may be stale"
          fi

      - name: Sync version numbers from package.json
        run: |
          if npx grunt --version &> /dev/null 2>&1; then
            npx grunt pre_vcs || echo "::warning::pre_vcs failed — versions may be stale"
          fi

      - name: Build plugin
        run: |
          if npx grunt --version &> /dev/null 2>&1; then
            npx grunt build
          else
            echo "No Grunt build — shipping source directly"
          fi

      - name: Package plugin
        id: package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SLUG=${{ inputs.plugin-slug }}

          # Check if grunt build created a release dir
          if [ -d "release/${VERSION}" ]; then
            echo "build_dir=release/${VERSION}" >> $GITHUB_OUTPUT
            # Zip name varies: core uses slug.version.zip, addons use slug.zip
            if [ -f "release/${SLUG}.${VERSION}.zip" ]; then
              echo "zip=release/${SLUG}.${VERSION}.zip" >> $GITHUB_OUTPUT
            elif [ -f "release/${SLUG}.zip" ]; then
              echo "zip=release/${SLUG}.zip" >> $GITHUB_OUTPUT
            else
              echo "::error::No release zip found"; ls release/; exit 1
            fi
          else
            # Create a clean build directory for addons without grunt
            mkdir -p "release/${VERSION}"
            rsync -a --exclude='.git' --exclude='node_modules' --exclude='tests' \
              --exclude='.github' --exclude='vendor' --exclude='.gitignore' \
              --exclude='Gruntfile.js' --exclude='package.json' \
              --exclude='package-lock.json' --exclude='yarn.lock' \
              --exclude='composer.json' --exclude='composer.lock' \
              --exclude='.yarnrc' --exclude='release.json' \
              --exclude='phpcs.xml.dist' --exclude='phpstan.neon.dist' \
              --exclude='phpstan-baseline.neon' --exclude='phpstan-stubs.php' \
              --exclude='playwright.config.ts' --exclude='tsconfig.json' \
              --exclude='.wp-env.json' --exclude='.wp-env.override.json' \
              --exclude='test-results' --exclude='release' \
              --exclude='README.md' --exclude='distributewp.json' \
              . "release/${VERSION}/"
            cd release && zip -r "${SLUG}.${VERSION}.zip" "${VERSION}/" -x '*/.*' && cd ..
            echo "build_dir=release/${VERSION}" >> $GITHUB_OUTPUT
            echo "zip=release/${SLUG}.${VERSION}.zip" >> $GITHUB_OUTPUT
          fi

      - name: Verify build artifacts
        run: |
          test -d "${{ steps.package.outputs.build_dir }}" || { echo "::error::Build directory not found — does package.json version match the tag?"; exit 1; }
          test -f "${{ steps.package.outputs.zip }}" || { echo "::error::Release zip not found"; exit 1; }
          echo "Build OK — ${{ steps.package.outputs.zip }}"

      - name: Deploy to WordPress.org
        if: steps.config.outputs.wordpress_org == 'true'
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ inputs.plugin-slug }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_DIR: ${{ steps.package.outputs.build_dir }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true

      - name: Add draft tweet to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SLUG=${{ inputs.plugin-slug }}
          TAG=${GITHUB_REF_NAME}
          TYPE=${{ steps.config.outputs.type }}

          # Derive display name: "wpum-custom-fields" -> "Custom Fields"
          if [ "$SLUG" = "wp-user-manager" ]; then
            DISPLAY_NAME="WP User Manager"
            ADDON_URL="https://wpusermanager.com/"
          else
            DISPLAY_NAME=$(echo "$SLUG" | sed 's/^wpum-//' | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
            ADDON_URL="https://wpusermanager.com/addons/${SLUG}/"
          fi

          # Extract changelog for this version from readme.txt
          # The changelog was already assembled during release prep (from PRs + project board)
          BULLETS=""
          if [ -f readme.txt ]; then
            # Extract lines between "= X.X.X ..." and the next "= " heading
            BULLETS=$(awk -v ver="= ${VERSION}" '
              $0 ~ ver { found=1; next }
              found && /^= / { exit }
              found && /^[-*] / { print $0 }
            ' readme.txt | sed 's/^[-*] /• /' | head -8)
          fi

          # Fallback: if readme.txt didn't have a changelog, try git log
          if [ -z "$BULLETS" ]; then
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              BULLETS=$(git log "${PREV_TAG}..${TAG}" --merges --first-parent --pretty=format:"%s" \
                | sed 's/Merge pull request #[0-9]* from [^ ]*//' \
                | sed 's/^ *//' \
                | grep -v '^$' \
                | sed 's/^/• /' \
                | head -8)
            fi
          fi

          # Get existing auto-generated release body
          EXISTING_BODY=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")

          # Compose the tweet block
          if [ "$TYPE" = "addon" ]; then
            HEADER="WP User Manager addon update 🚀"
          else
            HEADER="WP User Manager ${VERSION} Released 🚀"
          fi

          # Write tweet block to a temp file to avoid quoting issues
          cat > /tmp/tweet_block.md << TWEET_EOF
          📋 **Draft Tweet** *(copy to X — add emoji bullets as needed)*

          \`\`\`
          ${HEADER}

          📝 ${DISPLAY_NAME} v${VERSION}

          ${BULLETS}

          ${ADDON_URL}
          \`\`\`

          ---

          TWEET_EOF

          # Combine tweet block + existing release notes
          printf '%s\n%s' "$(cat /tmp/tweet_block.md)" "$EXISTING_BODY" > /tmp/release_body.md

          # Update the release
          gh release edit "$TAG" --notes-file /tmp/release_body.md

      - name: Update EDD download
        if: steps.config.outputs.edd == 'true'
        env:
          WPUM_RELEASE_API_TOKEN: ${{ secrets.WPUM_RELEASE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG=${{ inputs.plugin-slug }}
          VERSION=${{ steps.version.outputs.version }}
          DOWNLOAD_ID=${{ steps.config.outputs.edd_download_id }}
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${SLUG}.${VERSION}.zip"

          curl -sf -X POST https://wpusermanager.com/wp-json/wpum/v1/release \
            -H "Authorization: Bearer ${WPUM_RELEASE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"slug\": \"${SLUG}\",
              \"version\": \"${VERSION}\",
              \"download_id\": ${DOWNLOAD_ID},
              \"zip_url\": \"${RELEASE_URL}\",
              \"github_token\": \"${GH_TOKEN}\"
            }"
